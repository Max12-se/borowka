<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Ocen | JP2 Wilno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">JP2 - DZIENNIK</div>
        <a href="index.html" style="color:white; text-decoration:none;">Powrót do strony głównej</a>
    </nav>

    <div class="container-app">
        <h2>Kalkulator Średniej Ucznia</h2>
        <p>Wpisz swoje oceny oddzielone przecinkami (np. 5, 4, 6, 5):</p>
        
        <input type="text" id="inputOceny" placeholder="Wpisz oceny tutaj...">
        <button onclick="obliczSrednia()" class="btn-calc">Oblicz Wynik</button>

        <div id="wynikSekcja" class="result-box" style="display:none;">
            <h3>Twoja średnia: <span id="sredniaWartosc">0</span></h3>
            <p id="komunikat"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
